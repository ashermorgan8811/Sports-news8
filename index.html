<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<meta name="color-scheme" content="light only"/>
<link rel="manifest" href="manifest.json"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="default"/>
<meta name="apple-mobile-web-app-title" content="The Daily Hardwood"/>
<link rel="apple-touch-icon" href="icon-192.png"/>
<meta name="theme-color" content="#E85D04"/>
<title>The Daily Hardwood</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;0,900;1,700&display=swap" rel="stylesheet"/>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
html,body{background:#ffffff!important;color:#E85D04!important;}
body{font-family:Georgia,serif;-webkit-font-smoothing:antialiased;line-height:1.5;}
:root{color-scheme:light only;}

/* ── TYPE SCALE ── */
/* 10px = labels/tags/meta */
/* 15px = body text */
/* 22px = card headlines */
/* 32px = section headlines */
/* 42px = lead headline */

/* ── LAYOUT ── */
.wrap{max-width:880px;margin:0 auto;padding:0 18px 60px;}

/* ── SECTIONS ── */
.sec{padding:28px 0;border-bottom:2px solid #f5d9c8;}
.sec:last-child{border-bottom:none;}
.sec-heading{font-size:11px;font-weight:700;letter-spacing:3px;text-transform:uppercase;color:#c94f00;margin-bottom:18px;display:flex;align-items:center;gap:10px;}
.sec-heading::after{content:'';flex:1;height:1px;background:#f5d9c8;}

/* ── BOXES ── */
.box{background:#fff;border:1px solid #f5d9c8;border-radius:6px;padding:18px;margin-bottom:12px;}
.box-accent{border-left:4px solid #E85D04;}
.box-title{font-size:11px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:#c94f00;margin-bottom:12px;padding-bottom:10px;border-bottom:2px solid #E85D04;display:flex;align-items:center;gap:8px;}

/* ── SCORE STRIP ── */
.score-strip{display:flex;gap:8px;overflow-x:auto;padding-bottom:6px;-webkit-overflow-scrolling:touch;scrollbar-width:none;}
.score-strip::-webkit-scrollbar{display:none;}
.score-card{flex-shrink:0;min-width:132px;border:1px solid #f5d9c8;border-radius:5px;padding:10px 12px;background:#fff;}
.score-card-label{font-size:10px;color:#c94f00;margin-bottom:5px;font-weight:600;}
.score-row{display:flex;justify-content:space-between;font-size:14px;color:#E85D04;margin-top:3px;}
.score-row .w{font-weight:900;}

/* ── STORY CARDS ── */
.story-card{border-bottom:1px solid #f5d9c8;cursor:pointer;}
.story-card:last-child{border-bottom:none;}
.story-header{padding:16px 0;display:flex;align-items:flex-start;gap:12px;}
.story-arrow{font-size:12px;color:#f5b899;flex-shrink:0;margin-top:4px;transition:transform .2s;}
.story-card.open .story-arrow{transform:rotate(90deg);}
.story-tag{font-size:10px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:#c94f00;margin-bottom:6px;}
.story-hl{font-size:22px;font-weight:700;font-family:'Playfair Display',serif;line-height:1.2;color:#E85D04;}
.story-body{padding:0 0 18px 26px;display:none;}
.story-card.open .story-body{display:block;}
.story-body p{font-size:15px;line-height:1.78;color:#E85D04;margin-bottom:.9em;}
.story-body p:last-child{margin-bottom:0;}
.story-src{display:flex;flex-wrap:wrap;gap:5px;margin-top:12px;}
.src-pill{font-size:10px;background:#fff5ef;border:1px solid #f5b899;border-radius:3px;padding:3px 8px;color:#c94f00;}

/* ── PULL QUOTE ── */
.pull-quote{border-left:4px solid #E85D04;padding:12px 16px;margin:16px 0;background:#fff8f5;border-radius:0 4px 4px 0;}
.pull-quote blockquote{font-size:17px;font-style:italic;font-family:'Playfair Display',serif;line-height:1.6;color:#E85D04;}
.pull-quote cite{font-size:11px;color:#c94f00;display:block;margin-top:6px;}

/* ── STAT CALLOUT ── */
.stat-callout{display:flex;gap:16px;flex-wrap:wrap;margin:14px 0;}
.stat-block{flex:1;min-width:90px;background:#fff5ef;border:1px solid #f5b899;border-radius:5px;padding:12px;text-align:center;}
.stat-block .num{font-size:28px;font-weight:900;font-family:'Playfair Display',serif;color:#E85D04;line-height:1;}
.stat-block .lbl{font-size:10px;color:#c94f00;letter-spacing:1px;text-transform:uppercase;margin-top:4px;}

/* ── GAMES TO WATCH ── */
.gtw-card{display:flex;gap:14px;padding:14px 0;border-bottom:1px solid #f5d9c8;align-items:flex-start;}
.gtw-card:last-child{border-bottom:none;}
.gtw-num{font-size:28px;font-weight:900;font-family:'Playfair Display',serif;color:#f5b899;flex-shrink:0;line-height:1;width:28px;}
.gtw-num.top{color:#E85D04;}
.gtw-game{font-size:17px;font-weight:700;color:#E85D04;margin-bottom:4px;}
.gtw-time{font-size:11px;color:#c94f00;margin-bottom:4px;}
.gtw-why{font-size:14px;color:#b84800;line-height:1.6;}

/* ── BRACKET ── */
.bkt-tabs{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:14px;}
.bkt-tab{font-size:11px;font-weight:700;padding:5px 13px;border-radius:20px;border:1px solid #f5d9c8;background:#fff;color:#c94f00;cursor:pointer;font-family:Georgia,serif;transition:all .15s;}
.bkt-tab.active{background:#fff5ef;border-color:#f5b899;color:#E85D04;}
.bkt-game{display:flex;align-items:center;gap:10px;padding:9px 0;border-top:1px solid #f5d9c8;}
.bkt-game:first-child{border-top:none;}
.bkt-seed{font-size:10px;font-weight:700;border-radius:3px;padding:2px 6px;min-width:22px;text-align:center;}
.bkt-seed.hi{background:#E85D04;color:#fff;}
.bkt-seed.lo{background:#f5d9c8;color:#c94f00;}
.bkt-team{font-size:14px;color:#E85D04;}
.bkt-team.fav{font-weight:700;font-size:15px;}
.bkt-result{font-size:11px;font-weight:700;color:#E85D04;text-align:right;min-width:70px;}
.bkt-dt{font-size:11px;color:#b84800;text-align:right;min-width:70px;}
.bkt-live{font-size:9px;color:#E85D04;font-weight:700;}

/* ── WHY IT MATTERS ── */
.why-box{margin-top:12px;padding:12px 14px;background:#fff5ef;border-left:3px solid #E85D04;border-radius:0 4px 4px 0;}
.why-label{font-size:10px;font-weight:700;letter-spacing:2px;color:#E85D04;text-transform:uppercase;margin-bottom:6px;}
.why-text{font-size:14px;line-height:1.7;color:#c94f00;}

/* ── MASTHEAD ── */
.mast-wrap{border-bottom:3px solid #E85D04;padding:14px 18px 12px;}
.mast-inner{max-width:880px;margin:0 auto;}
.mast-meta{display:flex;justify-content:space-between;align-items:center;font-size:11px;color:#c94f00;margin-bottom:10px;flex-wrap:wrap;gap:6px;}
.mast-logo{text-align:center;}
.mast-sources{font-size:10px;color:#c94f00;letter-spacing:2px;text-transform:uppercase;text-align:center;margin-top:6px;}
.mast-fact-btn{font-size:11px;color:#E85D04;border:1px solid #f5b899;background:#fff5ef;padding:4px 14px;border-radius:20px;cursor:pointer;font-family:Georgia,serif;}
.fact-panel{margin-top:10px;background:#fff5ef;border:1px solid #f5b899;border-radius:4px;padding:14px 16px;display:none;}
.fact-grid{display:grid;grid-template-columns:1fr 1fr;gap:5px;}
.fact-row{font-size:11px;color:#E85D04;line-height:1.5;}

/* ── FOOTER ── */
.footer{border-top:3px solid #E85D04;padding:16px 18px 20px;text-align:center;}
.countdown{font-size:11px;color:#c94f00;margin-top:8px;font-family:monospace;}

/* ── RESPONSIVE ── */
@media(max-width:640px){
  .story-hl{font-size:18px!important;}
  .fact-grid{grid-template-columns:1fr!important;}
  .stat-callout{gap:8px;}
  .stat-block .num{font-size:22px!important;}
}
</style>
</head>

// ─────────────────────────────────────────────────────────────────
//  DOM HELPERS
// ─────────────────────────────────────────────────────────────────
const el = (tag,cls,html) => { const e=document.createElement(tag); if(cls)e.className=cls; if(html!==undefined)e.innerHTML=html; return e; };
const div = (cls,html) => el('div',cls,html);
const span = (cls,html) => el('span',cls,html);
const p = (cls,html) => el('p',cls,html);

function secHeading(txt) {
  const d = div('sec-heading'); d.textContent = txt; return d;
}

function srcBar(sources) {
  const bar = div('story-src');
  sources.forEach(s => { const pill=span('src-pill'); pill.textContent='✓ '+s; bar.appendChild(pill); });
  return bar;
}

function statCallout(stats) {
  const row = div('stat-callout');
  stats.forEach(s => {
    const b = div('stat-block');
    b.innerHTML = `<div class="num">${s.n}</div><div class="lbl">${s.l}</div>`;
    row.appendChild(b);
  });
  return row;
}

// Story card — headline only until tapped
function storyCard(story, showImg) {
  const card = div('story-card');
  const header = div('story-header');
  const arrow = span('story-arrow'); arrow.textContent = '▶';
  const meta = div('');

  const tag = div('story-tag'); tag.textContent = story.tag + (story.date ? ' · ' + story.date : '');
  const hl = div('story-hl'); hl.textContent = story.hl;
  meta.appendChild(tag);
  meta.appendChild(hl);
  header.appendChild(arrow);
  header.appendChild(meta);
  card.appendChild(header);

  // Body — hidden until tapped
  const body = div('story-body');
  if (showImg !== false) {
    const img = makeImg(story.img || story.tag, story.seed || 0, 800, 400);
    body.appendChild(img);
    img.style.marginBottom = '14px';
  }
  if (story.stats) body.appendChild(statCallout(story.stats));
  const paragraphs = story.paras || (story.body ? [story.body] : []);
  paragraphs.forEach(para => {
    if (!para) return;
    const pp_el=document.createElement('p');
    pp_el.style.cssText='font-size:15px;line-height:1.78;color:#E85D04;margin-bottom:.9em;';
    pp_el.textContent=para;
    body.appendChild(pp_el);
  });
  if (story.why) {
    const wb = div('why-box');
    const wl = div('why-label'); wl.textContent = 'WHY IT MATTERS'; wb.appendChild(wl);
    const wt = div('why-text'); wt.textContent = story.why; wb.appendChild(wt);
    body.appendChild(wb);
  }
  if (story.src) body.appendChild(srcBar(story.src));
  card.appendChild(body);

  header.onclick = () => {
    const open = card.classList.toggle('open');
  };
  return card;
}

// Score card
function scoreCard(g) {
  const card = div('score-card');
  const lbl = div('score-card-label');
  lbl.textContent = (g.lg ? g.lg + ' · ' : '') + g.date;
  card.appendChild(lbl);
  const r1 = div('score-row'); r1.innerHTML = `<span>${g.away}</span><span class="${parseInt(g.aS)>parseInt(g.hS)?'w':''}">${g.aS}</span>`;
  const r2 = div('score-row'); r2.innerHTML = `<span>${g.home}</span><span class="${parseInt(g.hS)>parseInt(g.aS)?'w':''}">${g.hS}</span>`;
  card.appendChild(r1); card.appendChild(r2);
  return card;
}

// Soccer/baseball story with WHY IT MATTERS
function contextStory(s) {
  const card = div('story-card');
  const header = div('story-header');
  const arrow = span('story-arrow'); arrow.textContent = '▶';
  const meta = div('');
  const tag = div('story-tag'); tag.textContent = s.tag;
  const hl = div('story-hl'); hl.textContent = s.hl;
  meta.appendChild(tag); meta.appendChild(hl);
  header.appendChild(arrow); header.appendChild(meta);
  card.appendChild(header);

  const body = div('story-body');
  const bp = p(''); bp.style.cssText='font-size:15px;line-height:1.78;color:#E85D04;margin-bottom:12px;'; bp.textContent=s.body; body.appendChild(bp);
  if (s.why) {
    const wb = div('why-box');
    const wl = div('why-label'); wl.textContent='WHY IT MATTERS'; wb.appendChild(wl);
    const wt = div('why-text'); wt.textContent=s.why; wb.appendChild(wt);
    body.appendChild(wb);
  }
  body.appendChild(srcBar(s.src));
  card.appendChild(body);
  header.onclick = () => card.classList.toggle('open');
  return card;
}
