<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="color-scheme" content="light only"/>
<link rel="manifest" href="manifest.json"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="default"/>
<meta name="apple-mobile-web-app-title" content="The Daily Hardwood"/>
<link rel="apple-touch-icon" href="icon-192.png"/>
<meta name="theme-color" content="#E85D04"/>

<title>The Daily Hardwood</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;0,900;1,700&display=swap" rel="stylesheet"/>
<style>
*{box-sizing:border-box;margin:0;padding:0;color:inherit;}
:root{color-scheme:light only;}
html,body{background:#ffffff!important;color:#E85D04!important;}
body{font-family:Georgia,serif;background:#ffffff;color:#E85D04;-webkit-font-smoothing:antialiased;line-height:1.5;}

/* ── TYPOGRAPHY SCALE (4 levels) ──────────────────────────────────────────── */
/* LABEL: 10px — tags, timestamps, metadata, section labels */
.t-label{font-size:10px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:#c94f00;}
/* BODY: 15px — all readable text */
.t-body{font-size:15px;line-height:1.7;color:#E85D04;}
/* SUBHEAD: 20px — card headlines, names */
.t-sub{font-size:20px;font-weight:700;font-family:'Playfair Display',serif;line-height:1.2;color:#E85D04;}
/* HEADLINE: 32px — lead story, major numbers */
.t-head{font-size:32px;font-weight:900;font-family:'Playfair Display',serif;line-height:1.1;color:#E85D04;}

/* ── LAYOUT ────────────────────────────────────────────────────────────────── */
.wrap{max-width:860px;margin:0 auto;padding:0 20px 60px;}
.sec{padding:24px 0;border-bottom:1px solid #f5d9c8;}
.sec:last-child{border-bottom:none;}

/* ── SCORES ────────────────────────────────────────────────────────────────── */
.scr{display:flex;gap:8px;overflow-x:auto;padding-bottom:4px;-webkit-overflow-scrolling:touch;scrollbar-width:none;}
.scr::-webkit-scrollbar{display:none;}
.score-card{flex-shrink:0;min-width:130px;border:1px solid #f5d9c8;border-radius:4px;padding:10px 12px;background:#fff;}
.score-card.live{border-left:3px solid #E85D04;background:#fff8f4;}
.score-row{display:flex;justify-content:space-between;font-size:15px;color:#E85D04;margin-top:3px;}
.score-row .bold{font-weight:700;}

/* ── STORIES GRID ──────────────────────────────────────────────────────────── */
.stories-grid{display:grid;grid-template-columns:1fr 1fr;border:1px solid #f5d9c8;}
.card{padding:16px;cursor:pointer;border-right:1px solid #f5d9c8;border-bottom:1px solid #f5d9c8;transition:background .1s;}
.card:last-child,.card:nth-child(2){border-right:none;}
.card:nth-child(3),.card:nth-child(4){border-bottom:none;}
.card:hover{background:#fff8f4;}

/* ── LEAD STORY ────────────────────────────────────────────────────────────── */
.lg{display:grid;grid-template-columns:1fr 200px;gap:24px;align-items:start;}
.rule{height:3px;background:#E85D04;width:40px;margin:14px 0;}
.deck{font-size:15px;line-height:1.7;color:#b84800;font-style:italic;}
.body-p{font-size:15px;line-height:1.75;color:#E85D04;margin-bottom:1em;}
.body-p:last-child{margin-bottom:0;}
.hl{font-size:32px;font-weight:900;font-family:'Playfair Display',serif;line-height:1.1;margin-bottom:12px;color:#E85D04;}

/* ── TAGS & LABELS ─────────────────────────────────────────────────────────── */
.tag{font-size:10px;font-weight:700;letter-spacing:2px;color:#E85D04;margin-bottom:6px;text-transform:uppercase;}
.date-line{font-size:10px;color:#c94f00;margin-bottom:10px;}
.section-label{font-size:10px;font-weight:700;letter-spacing:2px;color:#c94f00;margin-bottom:14px;text-transform:uppercase;}

/* ── PILLS & SOURCES ───────────────────────────────────────────────────────── */
.src-bar{display:flex;flex-wrap:wrap;gap:6px;margin-top:12px;align-items:center;}
.src-lbl{font-size:10px;font-weight:700;color:#c94f00;letter-spacing:1px;margin-right:2px;}
.src-pill{font-size:10px;background:#fff5ef;border:1px solid #f5b899;border-radius:3px;padding:3px 8px;color:#c94f00;cursor:help;}
.pill{font-size:10px;background:#fff5ef;border:1px solid #f5b899;border-radius:3px;padding:3px 8px;color:#c94f00;}

/* ── TWO-COL GRIDS ─────────────────────────────────────────────────────────── */
.g2{display:grid;grid-template-columns:1fr 1fr;gap:24px;}
.g2b{display:grid;grid-template-columns:1fr 1fr;gap:0;}

/* ── RANKINGS ──────────────────────────────────────────────────────────────── */
.rank-row{display:flex;align-items:center;gap:12px;padding:10px 0;border-top:1px solid #f5d9c8;}
.rank-row:first-child{border-top:none;}
.rank-num{font-size:20px;font-weight:900;font-family:'Playfair Display',serif;min-width:22px;color:#f5b899;}
.f1-driver-row{display:flex;align-items:center;gap:12px;padding:10px 0;border-top:1px solid #f5d9c8;}
.f1-driver-row:first-child{border-top:none;}

/* ── REACTIONS ─────────────────────────────────────────────────────────────── */
.reaction-card{border:1px solid #f5d9c8;border-radius:4px;padding:16px;border-top:3px solid #E85D04;background:#fff;}
.plat-badge{font-size:10px;font-weight:700;color:#fff;padding:2px 7px;border-radius:3px;}

/* ── FORMS / BUTTONS ───────────────────────────────────────────────────────── */
.vote-btn{padding:10px 14px;border:1px solid #f5d9c8;background:#fff;color:#E85D04;cursor:pointer;font-family:Georgia,serif;font-size:15px;text-align:left;border-radius:3px;width:100%;margin-bottom:8px;transition:all .15s;}
.vote-btn.active{border-color:#E85D04;background:#fff5ef;color:#E85D04;font-weight:700;}
.reveal-btn{font-size:10px;color:#E85D04;border:1px solid #E85D04;background:transparent;padding:6px 14px;cursor:pointer;border-radius:3px;font-family:Georgia,serif;}
.log-btn{font-size:10px;color:#E85D04;border:1px solid #f5b899;background:#fff5ef;padding:4px 16px;border-radius:20px;cursor:pointer;font-family:Georgia,serif;}

/* ── F1 CARDS ──────────────────────────────────────────────────────────────── */
.f1-card{flex-shrink:0;min-width:148px;border:1px solid #f5d9c8;border-radius:4px;padding:10px 12px;background:#fff;}
.f1-card.winner{border-left:3px solid #E85D04;background:#fff5ef;}
.f1-dnf{flex-shrink:0;min-width:148px;border:1px solid #f5d9c8;border-radius:4px;padding:10px 12px;background:#fff8f4;}

/* ── NCAA BRACKET ──────────────────────────────────────────────────────────── */
.ncaa-seed{padding:10px 14px;border:1px solid #f5d9c8;border-radius:4px;border-left:3px solid #E85D04;background:#fff5ef;margin-bottom:8px;}
.ncaa-out{padding:10px 14px;background:#fff8f4;border:1px solid #f5d9c8;border-radius:4px;}

/* ── MISC ──────────────────────────────────────────────────────────────────── */
.countdown{margin-top:10px;font-size:10px;color:#c94f00;letter-spacing:.5px;}
img.photo{object-fit:cover;display:block;border:1px solid #f5d9c8;border-radius:3px;}
img.photo-circle{object-fit:cover;display:block;border-radius:50%;border:2px solid #E85D04;flex-shrink:0;}
.quote-wrap{display:flex;gap:16px;align-items:flex-start;}
.quote-bar{border-left:3px solid #E85D04;padding-left:16px;}
blockquote{font-size:20px;font-style:italic;font-family:'Playfair Display',serif;line-height:1.65;color:#E85D04;}
.quote-attr{font-size:10px;color:#c94f00;margin-top:8px;line-height:1.5;}
.take-block{border-left:4px solid #E85D04;padding-left:16px;}
.take-sport{font-size:10px;font-weight:700;color:#c94f00;margin-bottom:6px;letter-spacing:1px;text-transform:uppercase;}
.take-hl{font-size:20px;font-weight:900;font-family:'Playfair Display',serif;margin-bottom:10px;line-height:1.2;color:#E85D04;}
.take-body{font-size:15px;color:#b84800;line-height:1.75;}
.otd-year{font-size:36px;font-weight:900;font-family:'Playfair Display',serif;color:#E85D04;line-height:1;}
.game-row{display:flex;gap:14px;padding:12px 0;border-top:1px solid #f5d9c8;align-items:flex-start;}
.game-row:first-child{border-top:none;}
.game-bar{width:3px;min-height:36px;border-radius:2px;flex-shrink:0;margin-top:3px;}
.fact-grid{display:grid;grid-template-columns:1fr 1fr;gap:6px;}
.fact-row{font-size:10px;color:#E85D04;line-height:1.5;}
.stat-num{font-size:44px;font-weight:900;font-family:'Playfair Display',serif;color:#E85D04;line-height:1;}
.km-box{padding:10px 14px;background:#fff5ef;border-left:3px solid #E85D04;font-size:15px;font-style:italic;color:#c94f00;margin-bottom:10px;border-radius:0 3px 3px 0;}
.log-panel{margin-top:12px;background:#fff5ef;border:1px solid #f5b899;border-radius:4px;padding:16px;}
.log-title{font-size:10px;font-weight:700;color:#E85D04;letter-spacing:1px;margin-bottom:12px;}

/* ── DARK MODE ─────────────────────────────────────────────────────────────── */
body.dark{background:#0f0f0f!important;color:#E85D04!important;}
body.dark *{background-color:inherit;}
body.dark .sec{border-bottom-color:#2a1a0a!important;}
body.dark .card{background:#0f0f0f!important;}
body.dark .card:hover{background:#1a0f05!important;}
body.dark .score-card,.dark .f1-card{background:#111!important;border-color:#2a1a0a!important;}
body.dark .score-card.live{background:#1a0a00!important;}
body.dark .f1-card.winner{background:#1a0a00!important;}
body.dark .f1-dnf{background:#1a0505!important;}
body.dark .stories-grid{border-color:#2a1a0a!important;}
body.dark .card{border-color:#2a1a0a!important;}
body.dark .reaction-card{background:#111!important;border-color:#2a1a0a!important;}
body.dark .ncaa-seed{background:#1a0a00!important;border-color:#2a1a0a!important;}
body.dark .ncaa-out{background:#1a0505!important;}
body.dark .km-box{background:#1a0a00!important;}
body.dark .log-panel{background:#1a0a00!important;border-color:#2a1a0a!important;}
body.dark .src-pill,.dark .pill{background:#1a0a00!important;border-color:#2a1a0a!important;}
body.dark .vote-btn{background:#111!important;border-color:#2a1a0a!important;}
body.dark .vote-btn.active{background:#1a0a00!important;}
body.dark img.photo{filter:brightness(0.8)!important;}
body.dark .rank-row,.dark .f1-driver-row,.dark .game-row,.dark .f1-driver-row{border-top-color:#2a1a0a!important;}
body.dark img[alt="The Daily Hardwood"]{mix-blend-mode:multiply;}
.dm-toggle{background:none;border:1px solid #f5b899;border-radius:20px;padding:4px 14px;cursor:pointer;font-family:Georgia,serif;font-size:10px;color:#E85D04;transition:all .2s;}
body.dark .dm-toggle{background:#1a0a00!important;border-color:#2a1a0a!important;}

/* ── RESPONSIVE ────────────────────────────────────────────────────────────── */
@media(prefers-color-scheme:dark){
  html,body{background:#0f0f0f!important;color:#E85D04!important;}
}
@media(max-width:640px){
  .g2,.g2b,.lg,.stories-grid{grid-template-columns:1fr!important;}
  .g2b>div:last-child{border-left:none!important;padding-left:0!important;border-top:1px solid #f5d9c8;padding-top:16px;}
  .hm{display:none!important;}
  .hl{font-size:20px!important;}
  .card{border-right:none!important;}
  .stat-num{font-size:36px!important;}
}

/* ── CARD BOXES ────────────────────────────────────────────────────────────── */
.box{background:#fff;border:1px solid #f5d9c8;border-radius:6px;padding:16px;margin-bottom:12px;}
.box-title{font-size:10px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:#c94f00;margin-bottom:10px;padding-bottom:8px;border-bottom:2px solid #E85D04;}
.box-live{border-left:3px solid #E85D04;}
.score-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:8px;}
body.dark .box{background:#111!important;border-color:#2a1a0a!important;}
body.dark .box-title{border-bottom-color:#E85D04!important;}

</style>

<script>
// ─────────────────────────────────────────────────────────────────────────────
//  THE DAILY HARDWOOD -- single HTML file, no dependencies
//  Opens directly in any browser. Real Unsplash photos load on a website.
//  Flips to new edition every day at 5:30 AM.
// ─────────────────────────────────────────────────────────────────────────────

const OR = '#E85D04';

// ── EDITION CLOCK ─────────────────────────────────────────────────────────────
function getEditionDay() {
  const now = new Date();
  const offset = new Date(now.getTime() - 5.5 * 60 * 60 * 1000);
  return Math.floor((offset - new Date(offset.getFullYear(), 0, 0)) / 86400000);
}
function getEditionLabel() {
  const now = new Date();
  const mins = now.getHours() * 60 + now.getMinutes();
  const d = mins < 330 ? new Date(now.getTime() - 86400000) : now;
  return d.toLocaleDateString('en-US', { weekday:'long', month:'long', day:'numeric', year:'numeric' });
}
function msUntilNext() {
  const now = new Date(), next = new Date(now);
  next.setHours(5, 30, 0, 0);
  if (next <= now) next.setDate(next.getDate() + 1);
  return next - now;
}

const DOY        = getEditionDay();
const DATE_LABEL = getEditionLabel();
const DATE_ISO   = new Date().toISOString().slice(0, 10);

// ── SHUFFLE ───────────────────────────────────────────────────────────────────
function shuffle(arr) {
  const a = [...arr];
  let s = ((DOY + 1) * 2654435769) >>> 0;
  for (let i = a.length - 1; i > 0; i--) {
    s = (Math.imul(s ^ (s >>> 16), 2246822519)) >>> 0;
    s = (Math.imul(s ^ (s >>> 13), 3266489917)) >>> 0;
    s = (s ^ (s >>> 16)) >>> 0;
    const j = s % (i + 1);
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

// Each category has a pool of IDs that rotate daily
// Curated Picsum seed strings → always landscapes/architecture, never people
// Seeds are descriptive strings so they map to consistent non-portrait images

function getCategoryFromQuery(query) {
  const q = (query || '').toLowerCase();
  if (q.includes('basketball') || q.includes('nba') || q.includes('court') || q.includes('college')) return 'basketball';
  if (q.includes('formula') || q.includes('f1') || q.includes('racing') || q.includes('car')) return 'f1';
  if (q.includes('soccer') || q.includes('football') || q.includes('pitch') || q.includes('stadium')) return 'soccer';
  if (q.includes('ncaa') || q.includes('tournament') || q.includes('march')) return 'ncaa';
  if (q.includes('american football') || q.includes('nfl')) return 'nfl';
  if (q.includes('sport') || q.includes('arena') || q.includes('crowd')) return 'sports';
  return 'default';
}

function imgSrc(query, seed, w, h) {
  const cat = getCategoryFromQuery(query);
  const pool = IMG_POOLS[cat] || IMG_POOLS.default;
  const idx = (DOY + seed) % pool.length;
  const photoId = pool[idx];
  return `https://images.unsplash.com/${photoId}?w=${w}&h=${h}&fit=crop&auto=format&q=80`;
}
function picsumSrc(seed, w, h) {
  const pool = IMG_POOLS.default;
  const idx = (DOY + seed + 7) % pool.length;
  const photoId = pool[idx];
  return `https://images.unsplash.com/${photoId}?w=${w}&h=${h}&fit=crop&auto=format&q=80`;
}
function svgFallback(label, w, h) {
  const s = (label.length * 7 + DOY) % 200;
  return `https://picsum.photos/seed/${s}/${w}/${h}`;
}
function makeImg(query, seed, w, h, cls, styleStr, label) {
  const img = document.createElement('img');
  img.src = imgSrc(query, seed, w, h);
  img.alt = label || query;
  img.className = cls || 'photo';
  if (styleStr) img.style.cssText = styleStr;
  let attempt = 0;
  img.onerror = () => {
    attempt++;
    if (attempt === 1) img.src = picsumSrc(seed + 100, w, h);
    else if (attempt === 2) img.src = picsumSrc(seed + 200, w, h);
    else { img.src = svgFallback(label || query, w, h); img.onerror = null; }
  };
  return img;
}

// ── HELPERS ───────────────────────────────────────────────────────────────────
function el(tag, cls, html) {
  const e = document.createElement(tag);
  if (cls) e.className = cls;
  if (html !== undefined) e.innerHTML = html;
  return e;
}
function div(cls, html) { return el('div', cls, html); }
function span(cls, html) { return el('span', cls, html); }
function p(cls, html) { return el('p', cls, html); }

function srcBar(sources) {
  const bar = div('src-bar');
  const lbl = span('src-lbl'); lbl.textContent = 'SOURCES'; bar.appendChild(lbl);
  sources.forEach(s => {
    const pill = span('src-pill'); pill.textContent = '✓ ' + s.o;
    if (s.d) pill.title = s.d;
    bar.appendChild(pill);
  });
  return bar;
}

function pillEl(text) {
  const p = span('pill'); p.textContent = text; return p;
}

function scoreCard(g) {
  const card = div('score-card' + (g.live ? ' live' : ''));
  const stLine = div(''); stLine.style.cssText = `font-size:10px;color:${g.live?OR:'#c94f00'};font-weight:${g.live?700:400};margin-bottom:6px;`;
  stLine.textContent = (g.lg ? g.lg + ' · ' : '') + g.st; card.appendChild(stLine);
  const away = div('score-row'); away.innerHTML = `<span>${g.away}</span><span class="bold">${g.aS!=null?g.aS:'--'}</span>`; card.appendChild(away);
  const home = div('score-row'); home.style.marginTop='2px'; home.innerHTML = `<span>${g.home}</span><span class="bold">${g.hS!=null?g.hS:'--'}</span>`; card.appendChild(home);
  return card;
}

function makeSection(id) {
  const s = div('sec'); s.id = id; return s;
}

  const saved = localStorage.getItem('dh-dark');
  const prefersDark = window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches;
  const isDark = saved === 'true' || (saved === null && prefersDark);
  if (isDark) {
    document.body.classList.add('dark');
  }
  // Update button label after buildPage runs
  setTimeout(function() {
    const btn = document.getElementById('dm-btn');
    if (btn) btn.textContent = isDark ? '☀️ Light' : '🌙 Dark';
  }, 50);
}

function toggleDark() {
  const isDark = document.body.classList.toggle('dark');
  localStorage.setItem('dh-dark', isDark);
  const btn = document.getElementById('dm-btn');
  if (btn) btn.textContent = isDark ? '☀️ Light' : '🌙 Dark';
}

initDarkMode();

buildPage();
} catch(e) {
  document.getElementById('app').innerHTML = '<div style="padding:40px;font-family:monospace;color:#E85D04;background:#fff;font-size:15px;"><strong>JS Error:</strong><br>' + e.message + '<br><br>' + (e.stack||'').replace(/\n/g,'<br>') + '</div>';
}
</script>
</body>
</html>
