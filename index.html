<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8"/>
<meta name="color-scheme" content="light only"/>
<meta name="supported-color-schemes" content="light"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>The Daily Hardwood</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&display=swap" rel="stylesheet"/>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
html{background:#ffffff!important;}
body{font-family:Georgia,serif;background:#ffffff!important;color:#E85D04!important;padding:20px;max-width:860px;margin:0 auto;}
@media(prefers-color-scheme:dark){html,body,*{background-color:unset;}html,body{background:#ffffff!important;color:#E85D04!important;}}
h1{font-family:'Playfair Display',serif;font-size:36px;margin-bottom:10px;}
.sec{margin:24px 0;padding:20px;border:1px solid #f5d9c8;border-radius:6px;}
.sec h2{font-size:12px;font-weight:700;letter-spacing:3px;text-transform:uppercase;color:#c94f00;margin-bottom:14px;border-bottom:2px solid #E85D04;padding-bottom:8px;}
.story{border-bottom:1px solid #f5d9c8;padding:12px 0;cursor:pointer;}
.story:last-child{border-bottom:none;}
.story-tag{font-size:10px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:#c94f00;margin-bottom:4px;}
.story-hl{font-size:20px;font-weight:700;font-family:'Playfair Display',serif;line-height:1.2;display:flex;gap:8px;align-items:flex-start;}
.arrow{flex-shrink:0;font-size:11px;color:#f5b899;margin-top:3px;display:inline-block;transition:transform .2s;}
.open .arrow{transform:rotate(90deg);}
.story-body{display:none;padding:12px 0 0 20px;}
.open .story-body{display:block;}
.story-body p{font-size:15px;line-height:1.75;margin-bottom:10px;}
.why{background:#fff5ef;border-left:3px solid #E85D04;padding:10px 14px;margin-top:10px;border-radius:0 4px 4px 0;}
.why-lbl{font-size:10px;font-weight:700;letter-spacing:2px;text-transform:uppercase;margin-bottom:5px;}
.why-txt{font-size:14px;line-height:1.65;color:#c94f00;}
.pills{display:flex;flex-wrap:wrap;gap:5px;margin-top:10px;}
.pill{font-size:10px;background:#fff5ef;border:1px solid #f5b899;border-radius:3px;padding:3px 8px;color:#c94f00;}
.scores{display:flex;gap:8px;overflow-x:auto;padding-bottom:4px;}
.scores::-webkit-scrollbar{display:none;}
.card{flex-shrink:0;min-width:130px;border:1px solid #f5d9c8;border-radius:5px;padding:10px 12px;}
.card-lbl{font-size:10px;color:#c94f00;margin-bottom:5px;}
.row{display:flex;justify-content:space-between;font-size:14px;margin-top:3px;}
.row .w{font-weight:900;}
.stats{display:flex;gap:8px;flex-wrap:wrap;margin:10px 0;}
.stat{flex:1;min-width:75px;background:#fff5ef;border:1px solid #f5b899;border-radius:5px;padding:10px;text-align:center;}
.stat .n{font-size:26px;font-weight:900;font-family:'Playfair Display',serif;line-height:1;}
.stat .l{font-size:10px;color:#c94f00;text-transform:uppercase;letter-spacing:1px;margin-top:3px;}
.gtw-row{display:flex;gap:10px;padding:12px 0;border-bottom:1px solid #f5d9c8;}
.gtw-row:last-child{border-bottom:none;}
.gtw-num{font-size:26px;font-weight:900;font-family:'Playfair Display',serif;color:#f5b899;flex-shrink:0;line-height:1;}
.gtw-num.first{color:#E85D04;}
.gtw-game{font-size:16px;font-weight:700;margin-bottom:3px;}
.gtw-time{font-size:11px;color:#c94f00;margin-bottom:3px;}
.gtw-why{font-size:14px;color:#b84800;line-height:1.6;}
.bkt-tabs{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:12px;}
.bkt-tab{font-size:11px;font-weight:700;padding:4px 12px;border-radius:20px;border:1px solid #f5d9c8;background:#fff;color:#c94f00;cursor:pointer;}
.bkt-tab.on{background:#fff5ef;border-color:#f5b899;color:#E85D04;}
.bkt-game{display:flex;align-items:center;gap:8px;padding:8px 0;border-top:1px solid #f5d9c8;}
.bkt-game:first-child{border-top:none;}
.s1{background:#E85D04;color:#fff;font-size:10px;font-weight:700;border-radius:3px;padding:1px 5px;min-width:20px;text-align:center;}
.s2{background:#f5d9c8;color:#c94f00;font-size:10px;font-weight:700;border-radius:3px;padding:1px 5px;min-width:20px;text-align:center;}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.ecard{background:#fff5ef;border:1px solid #f5b899;border-radius:5px;padding:12px;}
.ecard-ico{font-size:18px;margin-bottom:5px;}
.ecard-ttl{font-size:14px;font-weight:700;margin-bottom:5px;}
.ecard-txt{font-size:13px;line-height:1.6;color:#c94f00;}
.footer{border-top:3px solid #E85D04;margin-top:30px;padding:16px 0;text-align:center;}
.footer-lbl{font-size:10px;color:#c94f00;letter-spacing:2px;text-transform:uppercase;}
.cd{font-size:11px;color:#c94f00;margin-top:6px;font-family:monospace;}
@media(max-width:600px){.grid2{grid-template-columns:1fr;}.story-hl{font-size:17px;}}
</style>
</head>

function storyCard(s,withStats){

  meta.appendChild(tag);meta.appendChild(hl);
  hdr.appendChild(arrow);hdr.appendChild(meta);

    s.stats.forEach(function(st){var b=div('stat');b.innerHTML='<div class="n">'+st.n+'</div><div class="l">'+st.l+'</div>';sr.appendChild(b);});

  if(s.body){var p=el('p','');p.textContent=s.body;body.appendChild(p);}
  if(s.why){
    var wb=div('why');
    wb.appendChild(txt('div','why-lbl','WHY IT MATTERS'));

}

});

// COUNTDOWN
function updateCD(){
  var ms=msNext(),h=Math.floor(ms/3600000),m=Math.floor(ms%3600000/60000),s=Math.floor(ms%60000/1000);
  function p(n){return String(n).padStart(2,'0');}
  var e=document.getElementById('cd');
  if(e)e.textContent='Next edition in '+p(h)+':'+p(m)+':'+p(s)+' · New at 5:30 AM';
}
updateCD();
setInterval(updateCD,1000);
