name: Daily Hardwood Update

on:
  schedule:
    - cron: '29 9 * * *'
    - cron: '0 10 * * *'
    - cron: '29 10 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4.2.2

      - name: Set up Python
        uses: actions/setup-python@v5.4.0
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests

      - name: Fetch scores and headlines
        run: python update_scores.py

      - name: Commit and push
        run: |
          git config user.name "Daily Hardwood Bot"
          git config user.email "bot@dailyhardwood.com"
          git add index.html
          git diff --staged --quiet || git commit -m "Daily update $(date +'%Y-%m-%d %H:%M UTC')"
          git push
